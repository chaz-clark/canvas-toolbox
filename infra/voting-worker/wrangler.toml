name = "canvas-toolbox-vote"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
# Run: wrangler d1 create canvas-toolbox-votes
# Then paste the database_id below
[[d1_databases]]
binding = "VOTES_DB"
database_name = "canvas-toolbox-votes"
database_id = "2938848e-ec82-4444-b330-1bdee3df86b8"

# KV Namespace binding (optional: rate limiting)
# Uncomment after running: wrangler kv:namespace create RATE_LIMIT_KV
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "PLACEHOLDER_REPLACE_AFTER_KV_CREATE"

[build]
command = ""

[env.production]
name = "canvas-toolbox-vote"
