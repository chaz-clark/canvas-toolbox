# Auto-applies the `agent-submitted` label to issues filed by the
# canvas-toolbox bug-intake worker (infra/bug-intake-worker/).
#
# Why this lives here instead of in the worker:
#   GitHub fine-grained PATs scoped Issues:read+write empirically can't
#   mutate labels at runtime (POST /labels and PATCH /issues both 403,
#   even though docs claim Issues:write is sufficient). Rather than
#   broaden the PAT's blast radius (Pull requests:write / Contents:write
#   would unlock label mutation but expand the surface), the worker
#   posts the issue clean and this Action does the labeling.
#
# Action tokens have the right scope by default — no PAT needed, no
# secret to rotate.
#
# Detection: the worker stamps every issue body with the footer
#   _Filed via canvas-toolbox bug-intake worker._
# That string is the signal.

name: agent-submitted label

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, 'Filed via canvas-toolbox bug-intake worker')
    permissions:
      issues: write
    steps:
      - name: Add agent-submitted label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label agent-submitted
